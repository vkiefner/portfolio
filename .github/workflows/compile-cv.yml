name: Compile CV

on:
  push:
    paths:
      - 'files/CV_Kiefner.tex'
    branches:
      - main

jobs:
  compile:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Install LaTeX dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended
      
      - name: Compile CV
        run: |
          cd files
          pdflatex -interaction=nonstopmode -halt-on-error CV_Kiefner.tex
          pdflatex -interaction=nonstopmode -halt-on-error CV_Kiefner.tex
          pdflatex -interaction=nonstopmode -halt-on-error CV_Kiefner.tex
      
      - name: Check PDF was created
        run: |
          if [ ! -f files/CV_Kiefner.pdf ]; then
            echo "=== ERROR: PDF not created ==="
            cat files/CV_Kiefner.log
            exit 1
          fi
          ls -lh files/CV_Kiefner.pdf
      
      - name: Commit and push PDF
        run: |
          git config --global user.name "CV Bot"
          git config --global user.email "noreply@github.com"
          git add files/CV_Kiefner.pdf
          git commit -m "Auto-compile CV [skip ci]" || echo "No changes to commit"
          git push origin main
